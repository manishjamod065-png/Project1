<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Manager | Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <Style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:1100px;
    height:650px;
    display:flex;
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
}


.left{
    flex:1;
    background:linear-gradient(rgba(15,23,42,.75),rgba(15,23,42,.75)),
    url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    text-align:center;
    color:white;
    padding:40px;
}

.overlay h1{
    font-size:42px;
    margin-bottom:20px;
}

.overlay p{
    font-size:18px;
    line-height:30px;
}


.right{
    flex:1;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:400px;
}

.login-box h2{
    color:#fff;
    font-size:35px;
    margin-bottom:10px;
}

.login-box p{
    color:#9ca3af;
    margin-bottom:30px;
}

.input-box{
    display:flex;
    align-items:center;
    background:#1f2937;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
}

.input-box i{
    color:#60a5fa;
    margin-right:12px;
}

.input-box input{
    width:100%;
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:16px;
}

.options{
    display:flex;
    justify-content:space-between;
    margin-bottom:25px;
    color:#d1d5db;
    font-size:14px;
}

.options a{
    color:#3b82f6;
    text-decoration:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.divider{
    text-align:center;
    margin:25px 0;
    color:#9ca3af;
}

.social-login{
    display:flex;
    justify-content:center;
    gap:20px;
}

.social-login a{
    width:55px;
    height:55px;
    border-radius:50%;
    background:#1f2937;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:22px;
    text-decoration:none;
    transition:.3s;
}

.social-login a:hover{
    background:#2563eb;
}

.register{
    margin-top:30px;
    text-align:center;
    color:#d1d5db;
}

.register a{
    color:#3b82f6;
    text-decoration:none;
    font-weight:600;
}

@media(max-width:900px){

.container{
    flex-direction:column;
    width:95%;
    height:auto;
}

.left{
    height:250px;
}

.login-box{
    width:90%;
    margin:40px auto;
}

}
    </Style>

</head>
<body>

<div class="container">

    <div class="left">

        <div class="overlay">

            <h1>Subscription Manager</h1>

            <p>
                Manage all your subscriptions like Netflix,
                Amazon Prime, Spotify, ChatGPT Plus and more
                from one place.
            </p>

        </div>

    </div>

    <div class="right">

        <form class="login-box">

            <h2>Welcome Back</h2>

            <p>Login to your account</p>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="Email Address">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Password">
            </div>

            <div class="options">

                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button type="submit">Login</button>

            <div class="divider">
                OR
            </div>

            <div class="social-login">

                <a href="#"><i class="fab fa-google"></i></a>

                <a href="#"><i class="fab fa-facebook-f"></i></a>

                
            </div>

            <div class="register">

                Don't have an account?

                <a href="register.html">Register</a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
