<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#141E30,#243B55);
    font-family:Arial,Helvetica,sans-serif;
    color:white;
    min-height:100vh;
}

.dashboard{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.dashboard h1{
    font-weight:bold;
}

.card-box{
    background:white;
    color:#333;
    border-radius:15px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    transition:.3s;
    text-align:center;
}

.card-box:hover{
    transform:translateY(-8px);
}

.card-box h2{
    font-size:38px;
    color:#0d6efd;
}

.main-card{
    background:white;
    color:black;
    border-radius:15px;
    padding:25px;
    margin-top:25px;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.form-control{
    margin-bottom:15px;
}

.table{
    margin-top:20px;
}

thead{
    background:#0d6efd;
    color:white;
}

.btn-danger{
    padding:5px 15px;
}

.progress{
    height:25px;
    margin-top:10px;
}

footer{
    text-align:center;
    margin-top:30px;
    color:white;
}

</style>

</head>
<body>

<div class="container py-5">

<div class="dashboard">

<div>
<h1>📊 Subscription Dashboard</h1>
<p>Manage all your subscriptions in one place</p>
</div>

<button class="btn btn-warning">Premium Dashboard</button>

</div>

<div class="row g-4">

<div class="col-md-4">

<div class="card-box">

<h5>Total Subscriptions</h5>

<h2 id="totalSubs">0</h2>

</div>

</div>

<div class="col-md-4">

<div class="card-box">

<h5>Monthly Expense</h5>

<h2>₹ <span id="totalExpense">0</span></h2>

</div>

</div>

<div class="col-md-4">

<div class="card-box">

<h5>Active Services</h5>

<h2 id="activeSubs">0</h2>

</div>

</div>

</div>

<div class="main-card">

<h4>Monthly Budget Usage</h4>

<div class="progress">

<div
class="progress-bar progress-bar-striped progress-bar-animated"
id="budgetBar"
style="width:0%">
0%
</div>

</div>

</div>

<div class="main-card">

<h3>Add Subscription</h3>

<form id="subscriptionForm">

<input
type="text"
id="service"
class="form-control"
placeholder="Service Name"
required>

<input
type="number"
id="price"
class="form-control"
placeholder="Monthly Price"
required>

<input
type="date"
id="renewalDate"
class="form-control"
required>

<button class="btn btn-primary w-100">
Add Subscription
</button>

</form>

</div>

<div class="main-card">

<div class="d-flex justify-content-between">

<h3>Your Subscriptions</h3>

<input
type="text"
id="search"
class="form-control w-25"
placeholder="Search">

</div>

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>Service</th>
<th>Price</th>
<th>Renewal</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="subscriptionList">

</tbody>

</table>

</div>

<footer>

Subscription Management System © 2026

</footer>

</div>

<script>

let subscriptions=JSON.parse(localStorage.getItem("subscriptions"))||[];

const form=document.getElementById("subscriptionForm");
const list=document.getElementById("subscriptionList");

form.addEventListener("submit",function(e){

e.preventDefault();

let service=document.getElementById("service").value;
let price=document.getElementById("price").value;
let renewal=document.getElementById("renewalDate").value;

subscriptions.push({
service,
price,
renewal
});

save();

form.reset();

});

function save(){

localStorage.setItem("subscriptions",JSON.stringify(subscriptions));

display();

}

function display(){

list.innerHTML="";

let total=0;

subscriptions.forEach((sub,index)=>{

total+=Number(sub.price);

list.innerHTML+=`

<tr>

<td>${sub.service}</td>

<td>₹${sub.price}</td>

<td>${sub.renewal}</td>

<td>

<button
class="btn btn-danger"
onclick="removeSub(${index})">

Delete

</button>

</td>

</tr>

`;

});

document.getElementById("totalSubs").innerHTML=subscriptions.length;

document.getElementById("activeSubs").innerHTML=subscriptions.length;

document.getElementById("totalExpense").innerHTML=total;

let percent=Math.min((total/5000)*100,100);

document.getElementById("budgetBar").style.width=percent+"%";

document.getElementById("budgetBar").innerHTML=Math.round(percent)+"%";

}

function removeSub(index){

subscriptions.splice(index,1);

save();

}

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase();

let rows=document.querySelectorAll("#subscriptionList tr");

rows.forEach(row=>{

row.style.display=row.innerText.toLowerCase().includes(value)?"":"none";

});

});

display();

</script>

</body>
</html>
